services:

  # ---------------------------------------------------------------------------
  # SQL Server 2022
  # ---------------------------------------------------------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      - "1434:1433"   # Host 1434 avoids conflict with a local SQL Server instance
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q \"SELECT 1\" -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ticketflow-net

  # ---------------------------------------------------------------------------
  # Redis 7 — cache-aside + distributed locking
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ticketflow-net

  # ---------------------------------------------------------------------------
  # .NET API — two replicas to demonstrate distributed coordination via Redis
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=TicketFlowDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      Redis__ConnectionString: "redis:6379"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ticketflow-net
    deploy:
      replicas: 2

  # ---------------------------------------------------------------------------
  # nginx load balancer — round-robin across the two API replicas
  # ---------------------------------------------------------------------------
  nginx-lb:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx-lb.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5000:80"     # API reachable at http://localhost:5000/api
    depends_on:
      - api
    networks:
      - ticketflow-net

  # ---------------------------------------------------------------------------
  # Angular SPA — nginx serves static files + proxies /api/ to nginx-lb
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"     # App reachable at http://localhost:4200
    depends_on:
      - nginx-lb
    networks:
      - ticketflow-net

volumes:
  sqlserver_data:
  redis_data:

networks:
  ticketflow-net:
    driver: bridge
