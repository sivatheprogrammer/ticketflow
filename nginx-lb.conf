upstream ticketflow_api {
    # Docker's embedded DNS resolves "api" to all replica IPs automatically.
    # round-robin is nginx's default — no extra config needed.
    server api:8080;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass         http://ticketflow_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Surface which API replica handled the request — useful for testing
        add_header X-Upstream-Addr $upstream_addr always;
    }
}
