server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with aggressive caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to the backend — avoids CORS in production
    location /api/ {
    proxy_pass         https://app-ticketflow-api-dev-siva04.azurewebsites.net/api/;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header   Host              app-ticketflow-api-dev-siva04.azurewebsites.net;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

    # All other routes → Angular's index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
